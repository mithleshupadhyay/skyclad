services:
  gateway:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/skyclad-gateway.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PROVIDER_TIMEOUT_MS: ${PROVIDER_TIMEOUT_MS:-15000}
      PROVIDER_MAX_RETRIES: ${PROVIDER_MAX_RETRIES:-2}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-3}
      CIRCUIT_RESET_TIMEOUT_MS: ${CIRCUIT_RESET_TIMEOUT_MS:-30000}
      MAX_PROMPT_CHARS: ${MAX_PROMPT_CHARS:-200000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    volumes:
      - gateway_data:/app/data

volumes:
  gateway_data:
